    <script type="text/plain" id="code-mittens">
--!strict

local RunService = game:GetService("RunService")

export type Pointer = number

local STRIDE = 64
local MAX_ENTITIES = 4096

local OFFSET_PARENT      = 0
local OFFSET_X_POS       = 4
local OFFSET_Y_POS       = 8
local OFFSET_X_SIZE      = 12
local OFFSET_Y_SIZE      = 16
local OFFSET_COLOR       = 20
local OFFSET_FLAGS       = 24
local OFFSET_HASH        = 28
local OFFSET_ANCHOR_X    = 32
local OFFSET_ANCHOR_Y    = 36
local OFFSET_TRANS       = 40
local OFFSET_LAYOUT_PAD  = 44
local OFFSET_LAYOUT_CFG  = 48
local OFFSET_ASPECT      = 52

local FLAG_ACTIVE        = 0b000000001
local FLAG_DIRTY_POS     = 0b000000010
local FLAG_DIRTY_SIZE    = 0b000000100
local FLAG_DIRTY_COLOR   = 0b000001000
local FLAG_MOUNTED       = 0b000010000
local FLAG_DIRTY_ANCHOR  = 0b000100000
local FLAG_DIRTY_TRANS   = 0b001000000
local FLAG_DIRTY_LAYOUT  = 0b010000000
local FLAG_DIRTY_ASPECT  = 0b100000000

local MemoryHeap = buffer.create(MAX_ENTITIES * STRIDE)
local PointerHead: Pointer = 0
local HardwareBridge: { [Pointer]: Instance } = setmetatable({}, { __mode = "v" }) :: any

local function Alloc(): Pointer
	local ptr = PointerHead
	PointerHead += STRIDE
	if PointerHead >= buffer.len(MemoryHeap) then error("OUT OF MEMORY", 2) end
	return ptr
end

require(script.attribution)

local function PackColor(c: Color3): number
	return bit32.bor(bit32.lshift(math.floor(c.R*255), 16), bit32.lshift(math.floor(c.G*255), 8), math.floor(c.B*255))
end

local function UnpackColor(packed: number): Color3
	return Color3.fromRGB(bit32.band(bit32.rshift(packed, 16), 0xFF), bit32.band(bit32.rshift(packed, 8), 0xFF), bit32.band(packed, 0xFF))
end

local function PackLayoutConfig(fill: string?, halign: string?, valign: string?): number
	local f = (fill == "Vertical") and 1 or 0
	local h = (halign == "Center") and 1 or (halign == "Right") and 2 or 0
	local v = (valign == "Center") and 1 or (valign == "Bottom") and 2 or 0
	return bit32.bor(f, bit32.lshift(h, 1), bit32.lshift(v, 3))
end

local function HashString(str: string): number
	local hash = 0
	for i = 1, #str do
		hash += string.byte(str, i)
		hash += bit32.lshift(hash, 10)
		hash = bit32.bxor(hash, bit32.rshift(hash, 6))
	end
	hash += bit32.lshift(hash, 3)
	hash = bit32.bxor(hash, bit32.rshift(hash, 11))
	return bit32.band(hash + bit32.lshift(hash, 15), 0xFFFFFFFF)
end

local ClassHashes = {
	[HashString("Frame")] = "Frame",
	[HashString("TextButton")] = "TextButton",
	[HashString("TextLabel")] = "TextLabel",
	[HashString("UIListLayout")] = "UIListLayout",
	[HashString("UIAspectRatioConstraint")] = "UIAspectRatioConstraint",
}

local function VirtualCPU()
	while true do
		for ptr = 0, PointerHead - STRIDE, STRIDE do
			local flags = buffer.readu32(MemoryHeap, ptr + OFFSET_FLAGS)
			if bit32.band(flags, FLAG_ACTIVE) == 0 then continue end

			local inst = HardwareBridge[ptr]

			if bit32.band(flags, FLAG_MOUNTED) == 0 then
				local hash = buffer.readu32(MemoryHeap, ptr + OFFSET_HASH)
				inst = Instance.new(ClassHashes[hash] or "Frame")

				if inst:IsA("GuiObject") then inst.BorderSizePixel = 0 end
				HardwareBridge[ptr] = inst

				local parentPtr = buffer.readu32(MemoryHeap, ptr + OFFSET_PARENT)
				if parentPtr ~= 0xFFFFFFFF and HardwareBridge[parentPtr] then
					inst.Parent = HardwareBridge[parentPtr]
				end
				flags = bit32.bor(flags, FLAG_MOUNTED)
			end

			local isGui = inst:IsA("GuiObject")

			if bit32.band(flags, FLAG_DIRTY_POS) ~= 0 then
				if isGui then (inst :: any).Position = UDim2.fromScale(buffer.readf32(MemoryHeap, ptr + OFFSET_X_POS), buffer.readf32(MemoryHeap, ptr + OFFSET_Y_POS)) end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_POS))
			end

			if bit32.band(flags, FLAG_DIRTY_SIZE) ~= 0 then
				if isGui then (inst :: any).Size = UDim2.fromScale(buffer.readf32(MemoryHeap, ptr + OFFSET_X_SIZE), buffer.readf32(MemoryHeap, ptr + OFFSET_Y_SIZE)) end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_SIZE))
			end

			if bit32.band(flags, FLAG_DIRTY_COLOR) ~= 0 then
				if isGui then
					local targetProp = inst:IsA("TextLabel") and "TextColor3" or "BackgroundColor3"
					;(inst :: any)[targetProp] = UnpackColor(buffer.readu32(MemoryHeap, ptr + OFFSET_COLOR))
				end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_COLOR))
			end

			if bit32.band(flags, FLAG_DIRTY_ANCHOR) ~= 0 then
				if isGui then (inst :: any).AnchorPoint = Vector2.new(buffer.readf32(MemoryHeap, ptr + OFFSET_ANCHOR_X), buffer.readf32(MemoryHeap, ptr + OFFSET_ANCHOR_Y)) end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_ANCHOR))
			end

			if bit32.band(flags, FLAG_DIRTY_TRANS) ~= 0 then
				if isGui then (inst :: any).BackgroundTransparency = buffer.readf32(MemoryHeap, ptr + OFFSET_TRANS) end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_TRANS))
			end

			if bit32.band(flags, FLAG_DIRTY_LAYOUT) ~= 0 then
				if inst:IsA("UIListLayout") then
					inst.Padding = UDim.new(buffer.readf32(MemoryHeap, ptr + OFFSET_LAYOUT_PAD), 0)
					local cfg = buffer.readu32(MemoryHeap, ptr + OFFSET_LAYOUT_CFG)

					local fills = {Enum.FillDirection.Horizontal, Enum.FillDirection.Vertical}
					local haligns = {Enum.HorizontalAlignment.Left, Enum.HorizontalAlignment.Center, Enum.HorizontalAlignment.Right}
					local valigns = {Enum.VerticalAlignment.Top, Enum.VerticalAlignment.Center, Enum.VerticalAlignment.Bottom}

					inst.FillDirection = fills[bit32.band(cfg, 1) + 1]
					inst.HorizontalAlignment = haligns[bit32.band(bit32.rshift(cfg, 1), 3) + 1]
					inst.VerticalAlignment = valigns[bit32.band(bit32.rshift(cfg, 3), 3) + 1]
				end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_LAYOUT))
			end

			if bit32.band(flags, FLAG_DIRTY_ASPECT) ~= 0 then
				if inst:IsA("UIAspectRatioConstraint") then
					inst.AspectRatio = buffer.readf32(MemoryHeap, ptr + OFFSET_ASPECT)
				end
				flags = bit32.band(flags, bit32.bnot(FLAG_DIRTY_ASPECT))
			end

			buffer.writeu32(MemoryHeap, ptr + OFFSET_FLAGS, flags)
		end
		coroutine.yield()
	end
end

local CPU_Thread = coroutine.create(VirtualCPU)
RunService.RenderStepped:Connect(function()
	if coroutine.status(CPU_Thread) == "suspended" then coroutine.resume(CPU_Thread) end
end)

local function MutateFlag(ptr: Pointer, flag: number)
	buffer.writeu32(MemoryHeap, ptr + OFFSET_FLAGS, bit32.bor(buffer.readu32(MemoryHeap, ptr + OFFSET_FLAGS), flag))
end

local function WritePosition(ptr: Pointer, x: number, y: number)
	buffer.writef32(MemoryHeap, ptr + OFFSET_X_POS, x); buffer.writef32(MemoryHeap, ptr + OFFSET_Y_POS, y); MutateFlag(ptr, FLAG_DIRTY_POS)
end
local function WriteSize(ptr: Pointer, w: number, h: number)
	buffer.writef32(MemoryHeap, ptr + OFFSET_X_SIZE, w); buffer.writef32(MemoryHeap, ptr + OFFSET_Y_SIZE, h); MutateFlag(ptr, FLAG_DIRTY_SIZE)
end
local function WriteColor(ptr: Pointer, c: Color3)
	buffer.writeu32(MemoryHeap, ptr + OFFSET_COLOR, PackColor(c)); MutateFlag(ptr, FLAG_DIRTY_COLOR)
end
local function WriteAnchor(ptr: Pointer, ax: number, ay: number)
	buffer.writef32(MemoryHeap, ptr + OFFSET_ANCHOR_X, ax); buffer.writef32(MemoryHeap, ptr + OFFSET_ANCHOR_Y, ay); MutateFlag(ptr, FLAG_DIRTY_ANCHOR)
end
local function WriteTransparency(ptr: Pointer, t: number)
	buffer.writef32(MemoryHeap, ptr + OFFSET_TRANS, t); MutateFlag(ptr, FLAG_DIRTY_TRANS)
end
local function WriteLayout(ptr: Pointer, pad: number, cfg: number)
	buffer.writef32(MemoryHeap, ptr + OFFSET_LAYOUT_PAD, pad); buffer.writeu32(MemoryHeap, ptr + OFFSET_LAYOUT_CFG, cfg); MutateFlag(ptr, FLAG_DIRTY_LAYOUT)
end
local function WriteAspect(ptr: Pointer, ratio: number)
	buffer.writef32(MemoryHeap, ptr + OFFSET_ASPECT, ratio); MutateFlag(ptr, FLAG_DIRTY_ASPECT)
end

export type Props = {
	Position: {number}?, Size: {number}?, AnchorPoint: {number}?,
	Transparency: number?, Color: Color3?, Text: string?,
	Padding: number?, FillDirection: string?, HorizontalAlignment: string?, 
	VerticalAlignment: string?, AspectRatio: number?
}

export type VirtualNode = {
	Ptr: Pointer,
	GetHardware: () -> Instance?
}

local function Construct(className: string)
	return function(props: Props)
		return function(parentPtr: Pointer?): VirtualNode
			local ptr = Alloc()

			local initialFlags = bit32.bor(FLAG_ACTIVE, FLAG_DIRTY_POS, FLAG_DIRTY_SIZE, FLAG_DIRTY_COLOR, FLAG_DIRTY_ANCHOR, FLAG_DIRTY_TRANS, FLAG_DIRTY_LAYOUT, FLAG_DIRTY_ASPECT)
			buffer.writeu32(MemoryHeap, ptr + OFFSET_HASH, HashString(className))
			buffer.writeu32(MemoryHeap, ptr + OFFSET_PARENT, parentPtr or 0xFFFFFFFF)
			buffer.writeu32(MemoryHeap, ptr + OFFSET_FLAGS, initialFlags)

			WritePosition(ptr, props.Position and props.Position[1] or 0, props.Position and props.Position[2] or 0)
			WriteSize(ptr, props.Size and props.Size[1] or 1, props.Size and props.Size[2] or 1)
			WriteColor(ptr, props.Color or Color3.new(1, 1, 1))
			WriteAnchor(ptr, props.AnchorPoint and props.AnchorPoint[1] or 0, props.AnchorPoint and props.AnchorPoint[2] or 0)
			WriteTransparency(ptr, props.Transparency or 0)

			WriteLayout(ptr, props.Padding or 0, PackLayoutConfig(props.FillDirection, props.HorizontalAlignment, props.VerticalAlignment))
			WriteAspect(ptr, props.AspectRatio or 1)

			local node: VirtualNode = { Ptr = ptr, GetHardware = function() return HardwareBridge[ptr] end }

			task.spawn(function()
				local inst = HardwareBridge[ptr]
				while not inst do task.wait(); inst = HardwareBridge[ptr] end

				if props.Text and (inst:IsA("TextLabel") or inst:IsA("TextButton")) then
					(inst :: any).Text = props.Text
					;(inst :: any).TextScaled = true
					if inst:IsA("TextLabel") and props.Transparency == nil then inst.BackgroundTransparency = 1 end
				end
			end)

			return node
		end
	end
end

local MittensAPI = {
	Frame = Construct("Frame"),
	Button = Construct("TextButton"),
	Label = Construct("TextLabel"),
	List = Construct("UIListLayout"),
	AspectRatio = Construct("UIAspectRatioConstraint"),

	MountToScreen = function(node: VirtualNode, screenGui: ScreenGui)
		task.spawn(function()
			local inst = node.GetHardware()
			while not inst do task.wait(); inst = node.GetHardware() end
			(inst :: any).Parent = screenGui
		end)
	end
}

local SecurityProxy = newproxy(true)
local mt = getmetatable(SecurityProxy)
mt.__index = MittensAPI
mt.__newindex = function() error("Segmentation Fault. Core Dumped.", 2) end

    <script>
        // --- SYNTAX HIGHLIGHTER ---
        function highlightLuau(rawText) {
            let escaped = rawText.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            let highlighted = escaped
                .replace(/(--.*)/g, '<span class="cm">$1</span>')
                .replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="str">$&</span>')
                .replace(/\b(local|function|return|if|then|end|for|while|continue|error|export|type|nil|true|false|and|or|not)\b/g, '<span class="kw">$1</span>')
                .replace(/\b(Instance|game|math|buffer|bit32|Color3|Vector2|UDim2|UDim|Enum|coroutine|task|string|setmetatable|require|newproxy|getmetatable|print)\b/g, '<span class="cls">$1</span>')
                .replace(/:([a-zA-Z_]\w*)/g, ':<span class="fn">$1</span>')
                .replace(/\b(0[xX][0-9a-fA-F]+|0[bB][01]+|\d+(?:\.\d+)?)\b/g, '<span class="num">$1</span>');

            const lines = highlighted.split('\n');
            if(lines[0].trim() === "") lines.shift();
            if(lines.length > 0 && lines[lines.length-1].trim() === "") lines.pop();

            return lines.map((line, i) => `<span class="line" data-line="${i + 1}">${line}</span>`).join('\n');
        }

        // --- MODAL LOGIC ---
        const modal = document.getElementById('script-modal');
        const codeContainer = document.getElementById('lua-code');
        const modalTitle = document.getElementById('modal-filename');
        const scrollBox = document.getElementById('modal-body-scroll');

        function openScript(scriptName) {
            // Fetch raw code from script tags
            const rawCode = document.getElementById(`code-${scriptName}`).textContent;
            
            // Highlight and inject
            codeContainer.innerHTML = highlightLuau(rawCode);
            modalTitle.innerText = scriptName;
            
            // Show modal & Reset Scroll
            modal.style.display = 'flex';
            scrollBox.scrollTop = 0;
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal(event) {
            if (event) event.stopPropagation();
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore background scrolling
        }

        // Close on escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && modal.style.display === "flex") {
                closeModal();
            }
        });

        // --- COPY LOGIC ---
        function copyCode(event) {
            const lines = document.querySelectorAll('#lua-code .line');
            let rawCode = '';
            lines.forEach(line => { rawCode += line.textContent + '\n'; });
            
            navigator.clipboard.writeText(rawCode).then(() => {
                const btn = event.currentTarget;
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                btn.style.background = 'var(--cyan)';
                btn.style.color = '#000';
                btn.style.borderColor = 'var(--cyan)';
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }, 2000);
            });
        }
    </script>
